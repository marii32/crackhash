spring.application.name=manager
spring.data.mongodb.uri=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/crackhash-db?replicaSet=my-mongo-set

WORKER1_URL=http://worker1:8080
WORKER2_URL=http://worker2:8080
WORKER3_URL=http://worker3:8080

spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=user
spring.rabbitmq.password=password

rabbitmq.worker_to_manager_queue.name=worker-to-manager-queue
rabbitmq.manager_to_worker_queue.name=manager-to-worker-queue
rabbitmq.exchange.name=direct-exchange
